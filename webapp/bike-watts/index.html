<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Watts</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
        #game-container { position: fixed; inset: 0; }
        canvas { display: block; }

        /* ── Toggle tab (always visible) ── */
        #overlay-toggle {
            position: fixed; top: 12px; right: 12px; z-index: 10000;
            background: #000c; backdrop-filter: blur(4px);
            border: 1px solid #ffffff22; border-radius: 8px;
            color: #94a3b8; font-size: 18px;
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: border-color .15s, color .15s;
        }
        #overlay-toggle:hover { border-color: #3b82f6; color: #e2e8f0; }
        #overlay-toggle.connected { border-color: #22c55e; color: #22c55e; }

        /* ── Collapsible panel ── */
        #input-overlay {
            position: fixed; top: 56px; right: 12px; z-index: 9999;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #000d; backdrop-filter: blur(6px);
            border: 1px solid #ffffff18;
            color: #e2e8f0; padding: 8px 10px;
            border-radius: 10px; min-width: 190px;
            display: flex; flex-direction: column; gap: 4px;
            transform-origin: top right;
            transition: opacity .15s, transform .15s;
        }
        #input-overlay.hidden {
            opacity: 0; transform: scale(0.85);
            pointer-events: none;
        }
        #input-overlay .ov-label {
            font-size: 9px; color: #64748b;
            text-transform: uppercase; letter-spacing: .1em; margin-bottom: 2px;
        }
        .src-btn {
            padding: 5px 8px; background: #1e293b;
            border: 1px solid #334155; border-radius: 6px;
            color: #94a3b8; cursor: pointer; text-align: left; font-size: 11px;
            transition: border-color .15s, color .15s;
        }
        .src-btn:hover  { border-color: #3b82f6; color: #e2e8f0; }
        .src-btn.active { border-color: #22c55e; color: #22c55e; background: #052e16; }
        #bike-hud {
            font-size: 10px; color: #64748b; font-family: monospace;
            border-top: 1px solid #1e293b; padding-top: 4px; margin-top: 2px;
        }
    </style>
</head>
<body>

<!-- Full-screen Phaser container -->
<div id="game-container"></div>

<!-- Toggle tab (always visible, top-right corner) -->
<button id="overlay-toggle" title="Input source">📡</button>

<!-- Collapsible input-source panel -->
<div id="input-overlay" class="hidden">
    <div class="ov-label">Input source</div>
    <button class="src-btn active" id="btn-ble">📡 Real bike (BLE)</button>
    <button class="src-btn"        id="btn-mock">🚴 Bike simulation (mock)</button>
    <button class="src-btn"        id="btn-keyboard">⌨ Keyboard (SHIFT / SPACE)</button>
    <div id="bike-hud">—</div>
</div>

<!-- Phaser 3 -->
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

<!-- Bike trainer SDK + input bridge (module) -->
<script type="module">
import { BikeTrainerBLE, BikeTrainerMock } from '../bike_trainer.js';

// ── Shared bike state (polled by game.js every frame) ────────────────────────
//   window.bikeInput → { speedKmh, cadenceRpm, powerW, connected }
window.bikeInput = { speedKmh: 0, cadenceRpm: 0, powerW: 0, connected: false };

let activeTrainer = null;

// ── Overlay toggle ────────────────────────────────────────────────────────────
const overlayToggle = document.getElementById('overlay-toggle');
const inputOverlay  = document.getElementById('input-overlay');
overlayToggle.addEventListener('click', () => {
    inputOverlay.classList.toggle('hidden');
});
// Close panel when clicking outside of it
document.addEventListener('pointerdown', (e) => {
    if (!inputOverlay.classList.contains('hidden') &&
        !inputOverlay.contains(e.target) &&
        e.target !== overlayToggle) {
        inputOverlay.classList.add('hidden');
    }
});

function setActive(id) {
    document.querySelectorAll('.src-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

async function connectTrainer(TrainerClass, opts = {}) {
    if (activeTrainer?.connected) await activeTrainer.disconnect();

    activeTrainer = new TrainerClass(opts);
    activeTrainer.onLog = (msg) => console.debug('[bike]', msg);
    activeTrainer.onConnectionChange = (connected) => {
        window.bikeInput.connected = connected;
        overlayToggle.classList.toggle('connected', connected);
        if (!connected) document.getElementById('bike-hud').textContent = '—';
    };
    activeTrainer.onData = ({ speedKmh, cadenceRpm, powerW }) => {
        Object.assign(window.bikeInput, { speedKmh, cadenceRpm, powerW });
        document.getElementById('bike-hud').textContent =
            `${speedKmh.toFixed(1)} km/h · ${Math.round(cadenceRpm)} rpm · ${powerW} W`;
    };

    try { await activeTrainer.connect(); }
    catch (e) { console.error('[bike] connect failed:', e); }
}

document.getElementById('btn-keyboard').addEventListener('click', async () => {
    if (activeTrainer?.connected) await activeTrainer.disconnect();
    activeTrainer = null;
    window.bikeInput = { speedKmh: 0, cadenceRpm: 0, powerW: 0, connected: false };
    document.getElementById('bike-hud').textContent = '—';
    setActive('btn-keyboard');
});

// Mock: disable built-in key shortcuts so they don't conflict with game controls
document.getElementById('btn-mock').addEventListener('click', () => {
    setActive('btn-mock');
    connectTrainer(BikeTrainerMock, { keyboardControl: false });
});

document.getElementById('btn-ble').addEventListener('click', () => {
    setActive('btn-ble');
    connectTrainer(BikeTrainerBLE);
});

// ── Input source init ───────────────────────────────────────────────────────
// ?input=ble      → real bike BLE  (default — pre-selected, click the button to connect)
// ?input=mock     → bike simulation (auto-starts)
// ?input=keyboard → keyboard only   (auto-starts)
//
// Web Bluetooth requires a real user gesture — BLE is never auto-started.
const inputParam = new URLSearchParams(location.search).get('input') ?? 'ble';
if (inputParam === 'mock') {
    setActive('btn-mock');
    connectTrainer(BikeTrainerMock, { keyboardControl: false });
} else if (inputParam === 'keyboard') {
    setActive('btn-keyboard');
} else {
    // BLE: just highlight the button — user must click to open the browser picker
    setActive('btn-ble');
}
</script>

<!-- Phaser game (plain script — must load after Phaser CDN) -->
<script src="js/game.js"></script>

</body>
</html>
